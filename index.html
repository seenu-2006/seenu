<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    text-align:center;
}

img{
    width:130px;
    margin-bottom:15px;
}

h2{
    color:#c00000;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#c00000;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#900000;
}

.note{
    margin-top:15px;
    color:gray;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

<img src="logo.png" alt="College Logo">

<h2>Student Login (Demo)</h2>

<form onsubmit="return loginDemo();">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p class="note">Demo page only. No credentials are collected or stored.</p>

</div>

<script>
function loginDemo(){
    alert("Demo Login Successful!");
    return false;
}
</script>

</body>
</html>
<img src="logo.png" width="170" alt="College Logo">
